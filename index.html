<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script>
        if (localStorage.getItem('flighttrack_setup_complete') !== 'true' && (window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true)) {
            // Only enforce setup configuration if they are inside the installed app

            window.location.replace('./setup/');

        }
    </script>
    <title>Aviation PWA Map</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:,">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FlightTrack">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                let newWorker;

                navigator.serviceWorker.register('./sw.js', { scope: '/' })
                    .then(reg => {
                        console.log('Service Worker Registered Offline: ', reg.scope);

                        // 1. Check if there's already an update waiting in the background
                        if (reg.waiting) {
                            newWorker = reg.waiting;
                            showUpdateBanner(newWorker);
                        }

                        // 2. Listen for future updates found while the app is running
                        reg.addEventListener('updatefound', () => {
                            const installingWorker = reg.installing;

                            installingWorker.addEventListener('statechange', () => {
                                // If the new worker finishes installing, it enters the 'waiting' state
                                if (installingWorker.state === 'installed') {
                                    if (navigator.serviceWorker.controller) {
                                        newWorker = installingWorker;
                                        showUpdateBanner(newWorker);
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => console.error('Service Worker Fault: ', err));

                // 3. Listen for the controlling service worker changing to reload the page automatically
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    window.location.reload();
                });
            });
        }

        // Function to reveal UI banner and bind click event to the waiting worker
        function showUpdateBanner(worker) {
            const banner = document.getElementById('update-banner');
            const updateBtn = document.getElementById('btn-apply-update');

            banner.style.display = 'block'; // Make the hidden button visible

            updateBtn.addEventListener('click', () => {
                // Post the message to the service worker to execute self.skipWaiting()
                worker.postMessage({ type: 'SKIP_WAITING' });
            });
        }
    </script>
</head>

<body>
    <div class="app-viewport">
        <div class="map-wrapper">
            <div id="map"></div>

            <div id="ui-layer">
                <button class="btn" id="btn-plan-flight">Plan Flight</button>
                <button class="btn" id="btn-layer-menu">Layers</button>
                <button class="btn" id="btn-menu-toggle">☰ Menu</button>

                <div id="update-banner"
                    style="display: none; position: fixed; top: 20px; right: 20px; background: #1c1c1e; border: 1px solid #00ff00; padding: 15px; border-radius: 8px; z-index: 10000;">
                    <p style="margin: 0 0 10px 0; font-size: 14px; color: #fff;">App update available!</p>
                    <button id="btn-apply-update" class="btn" style="padding: 6px 12px; font-size: 12px;">Update
                        Now</button>
                </div>
            </div>
        </div>

        <div class="panel-control-bar">
            <button id="btn-toggle-panel" class="panel-toggle-btn">▲ Show Notes</button>
        </div>

        <div id="notes-panel" class="notes-panel collapsed">
            <textarea id="aviation-notes"
                placeholder="Enter logs, clearance text, or squawk instructions here..."></textarea>
        </div>

        <footer class="footer-navigation">
            <button class="nav-arrow" id="nav-prev">◀</button>
            <button class="nav-arrow" id="nav-next">▶</button>
        </footer>
    </div>

    <div id="nav-drawer" class="nav-drawer">
        <div class="drawer-header">
            <h3>FlightTrack Menu</h3>
            <button id="btn-menu-close">✕</button>
        </div>
        <nav class="drawer-links">
            <a href="#" class="active">🗺️ Primary Map Workspace</a>
            <button class="menu-placeholder-btn">📂 Saved Flight Logs</button>
            <button class="menu-placeholder-btn">🛰️ GNSS Diagnostics</button>
            <button class="menu-placeholder-btn">🛠️ Instrument Options</button>
            <a href="./settings/">⚙️ Settings</a>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
