<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="settings-container">
        <h1>Settings</h1>

        <div class="settings-options">
            <div class="setting-item">
                <span class="setting-title">Document Overview</span>
                <button class="btn-secondary">Manage</button>
            </div>

            <div class="setting-item">
                <span class="setting-title">Aircraft</span>
                <button class="btn-secondary">Configure</button>
            </div>

            <div class="setting-item">
                <span class="setting-title">Overlayed Documents</span>
                <button class="btn-secondary">View</button>
            </div>

            <hr class="divider">

            <div class="setting-item update-section">
                <div class="update-info">
                    <span class="setting-title">App Updates</span>
                    <p id="update-status">Your app is up to date.</p>
                </div>
                <button id="update-btn" class="btn-primary">Check for Update</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
