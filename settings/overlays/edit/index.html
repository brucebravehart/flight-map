<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation PWA - Align Chart</title>
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .control-panel {
            width: 340px;
            background: #1a202c;
            color: #fff;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.2);
        }

        .map-viewport {
            flex: 1;
            height: 100%;
            position: relative;
        }

        h2 {
            font-size: 1.25rem;
            color: #f7fafc;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #a0aec0;
            margin-bottom: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e0;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #007aff;
            cursor: pointer;
        }

        .val-display {
            font-size: 0.8rem;
            color: #a0aec0;
            text-align: right;
            margin-top: 2px;
            font-family: monospace;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #007aff;
            color: white;
        }

        .btn-primary:hover {
            background: #0062cc;
        }

        .btn-secondary {
            background: #4a5568;
            color: #e2e8f0;
            margin-top: auto;
        }

        .btn-secondary:hover {
            background: #2d3748;
        }
    </style>
</head>

<body>

    <aside class="control-panel">
        <div>
            <h2 id="chart-title">Align Chart</h2>
            <p class="subtitle" id="target-pdf-display">Loading PDF context...</p>
        </div>

        <hr style="border-color: #2d3748;">

        <div class="control-group">
            <label>Scale (Size Span)</label>
            <input type="range" id="slider-scale" min="0.001" max="0.100" step="0.0005" value="0.015">
            <div class="val-display" id="val-scale">0.0150</div>
        </div>

        <div class="control-group">
            <label>Rotation (Orientation)</label>
            <input type="range" id="slider-rotate" min="-180" max="180" step="0.1" value="0">
            <div class="val-display" id="val-rotate">0.0°</div>
        </div>

        <div class="control-group">
            <label>Shift Latitude (North/South)</label>
            <input type="range" id="slider-lat" min="-0.05" max="0.05" step="0.0001" value="0">
            <div class="val-display" id="val-lat">0.0000</div>
        </div>

        <div class="control-group">
            <label>Shift Longitude (East/West)</label>
            <input type="range" id="slider-lng" min="-0.05" max="0.05" step="0.0001" value="0">
            <div class="val-display" id="val-lng">0.0000</div>
        </div>

        <button id="save-config-btn" class="btn btn-primary">💾 Save Dynamic Overlay</button>
        <a href="./../" class="btn btn-secondary">⬅ Cancel & Exit</a>
    </aside>

    <main id="map" class="map-viewport"></main>

    <script type="module" src="app.js"></script>
</body>

</html>
