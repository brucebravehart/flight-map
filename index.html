<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script>
        if (localStorage.getItem('flighttrack_setup_complete') !== 'true') {
            window.location.replace('/setup/');
        }
    </script>
    <title>Aviation PWA Map</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:,">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FlightTrack">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered Offline: ', reg.scope))
                    .catch(err => console.error('Service Worker Fault: ', err));
            });
        }
    </script>
</head>

<body>

    <div id="map"></div>

    <div id="ui-layer">
        <button class="btn" id="btn-toggle-icon">Change Icon Style</button>
        <label class="btn" for="file-input">Import PDF Chart</label>
        <input type="file" id="file-input" accept="application/pdf" />
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
